name: Nightly Full Test Suite

# Runs all tests including @slow markers that are skipped in PR CI.
# Catches regressions in heavy validation tests within 24h.

on:
  schedule:
    # Run at 03:00 UTC daily (11:00 CST)
    - cron: '0 3 * * *'

  # Allow manual trigger
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  full-test-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,numerical]"

    - name: Run full test suite (including slow tests)
      run: |
        pytest tests/ -v \
          --ignore=tests/unit/test_backends/ \
          --ignore=tests/unit/test_visualization/ \
          -m "not optional_torch and not benchmark and not experimental and not environment" \
          --cov=mfgarchon --cov-report=term \
          --junitxml=junit.xml -o junit_family=legacy \
          --maxfail=10 \
          --durations=20

    - name: Upload test results
      if: ${{ !cancelled() }}
      uses: codecov/test-results-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./junit.xml
        fail_ci_if_error: false

name: PR Mypy Expansion Check
#
# Temporary workflow for mypy expansion PR to check only changed files
# This avoids blocking on 600+ pre-existing style issues in the codebase
#

on:
  pull_request:
    branches: [main]
    paths:
      - 'mfgarchon/factory/solver_factory.py'
      - 'mfgarchon/geometry/base_geometry.py'
      - '.pre-commit-config.yaml'

jobs:
  mypy-expansion-check:
    runs-on: ubuntu-latest
    if: contains(github.head_ref, 'mypy') || contains(github.head_ref, 'type')

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: 3.12
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Check changed Python files with Ruff
      run: |
        echo "🔍 Checking only PR-modified files with Ruff..."
        ruff check mfgarchon/factory/solver_factory.py mfgarchon/geometry/base_geometry.py
        echo "✅ All changed files pass Ruff checks"

    - name: Check changed Python files with mypy
      run: |
        echo "🔍 Checking only PR-modified files with mypy..."
        mypy mfgarchon/factory/solver_factory.py mfgarchon/geometry/base_geometry.py --follow-imports=silent --ignore-missing-imports
        echo "✅ All changed files pass mypy checks"

    - name: Verify mypy coverage expansion
      run: |
        echo "🔍 Testing expanded mypy coverage pattern..."
        mypy mfgarchon/simple.py mfgarchon/core/mfg_problem.py mfgarchon/types/ mfgarchon/geometry/base_geometry.py mfgarchon/factory/solver_factory.py --follow-imports=silent --ignore-missing-imports
        echo "✅ All files in expanded mypy coverage pass"

    - name: Summary
      run: |
        echo "🎉 Mypy expansion PR validation complete!"
        echo "✅ Changed files pass all quality checks"
        echo "✅ Mypy coverage successfully expanded"
        echo "✅ Pre-commit integration functional"

# pyproject.toml

[build-system]
requires = ["setuptools>=82.0.1"] # Minimum version of setuptools
build-backend = "setuptools.build_meta"
#backend-path = ["."] # Optional: If you have a custom build backend, you can specify it here.
# Optional: If you want to use PEP 517/518, you can specify the backend requirements here.

[project]
name = "mfgarchon"
version = "0.18.19"  # v0.18.19: GraphMFGSolver, alg/scripts cleanup, auto-generated deprecation guide
authors = [
    { name = "Jiongyi Wang", email = "jiongyiwang@gmail.com" },
    # et al.
]
description = "A comprehensive Python framework for solving Mean Field Games with advanced numerical methods, interactive visualizations, and professional research tools."
readme = "README.md"
requires-python = ">=3.12"  # Updated to match conda environments
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Mathematics",
]
dependencies = [
    # ==================== DEFAULT INSTALL ====================
    # pip install mfgarchon -> batteries included for research
    # Covers: FDM, FEM, GFDM, variational, visualization, notebooks

    # Core scientific computing
    "numpy>=2.0",
    "scipy>=1.13",
    "matplotlib>=3.8",

    # Progress and utilities
    "rich>=13.0",              # Progress bars (required by all solvers)
    "pydantic>=2.12.5,<3.0",     # Config validation
    "typing-inspection",       # Runtime type inspection

    # Data processing and I/O
    "pandas>=2.1",             # Data utilities
    "h5py>=3.9",               # Incremental result saving
    "nbformat>=5.0",           # Notebook result export

    # Interactive computing and visualization
    "jupyter>=1.0",
    "jupyterlab>=4.0",
    "plotly>=5.17",            # Interactive plots in notebooks
    "seaborn>=0.13",           # Statistical plotting

    # FEM support (used by HJBFEMSolver, FPFEMSolver)
    "scikit-fem>=9.0",         # FEM assembly
    "meshio>=5.3",             # Mesh I/O (Gmsh, VTK)

    # GFDM monotone stencils (used by HJBGFDMSolver)
    "osqp>=0.6",               # QP solver for monotonicity enforcement

    # Network MFG (used by NetworkGeometry)
    "igraph>=0.10.0",          # Graph backend (C-based, fast)

    # Configuration management
    "omegaconf>=2.3",

    # System monitoring
    "psutil>=7.2.2",
]

# ==================== OPTIONAL DEPENDENCY TIERS ====================
# Three user-facing tiers + dev (Issue #978)
#
#   pip install mfgarchon          -> default (batteries included)
#   pip install mfgarchon[core]    -> minimal (CI, Docker, embedding)
#   pip install mfgarchon[nn]      -> + PyTorch, RL
#   pip install mfgarchon[all]     -> + JAX, performance, everything
#   pip install mfgarchon[dev]     -> development tools

[project.optional-dependencies]

# Minimal install: only numpy/scipy/matplotlib/rich/pydantic
# Use for CI pipelines, Docker images, or embedding in other packages.
# Note: pip doesn't support "fewer than default" extras directly.
# To get a minimal install, use: pip install mfgarchon --no-deps
# then: pip install numpy scipy matplotlib rich pydantic typing-inspection
core = [
    "numpy>=2.0",
    "scipy>=1.13",
    "matplotlib>=3.8",
    "rich>=13.0",
    "pydantic>=2.12.5,<3.0",
    "typing-inspection",
]

# Neural network and reinforcement learning solvers
# Adds: DGM, PINN, Actor-Critic, PPO
nn = [
    "torch>=2.0",              # PyTorch (DGM, PINN)
    "gymnasium>=0.29",         # RL environments
    "stable-baselines3>=2.0",  # RL algorithms (AC, PPO)
    "tensorboard>=2.20.0",       # Training visualization
]

# Everything: default + nn + JAX + performance + advanced viz
all = [
    # Neural/RL (same as nn)
    "torch>=2.0",
    "gymnasium>=0.29",
    "stable-baselines3>=2.0",
    "tensorboard>=2.20.0",
    # JAX acceleration
    "jax>=0.4.20",
    "jaxlib",
    # Performance
    "numba>=0.59",
    "polars>=0.20",
    "joblib>=1.3",
    # Advanced visualization
    "bokeh>=3.3",
    # Extended network analysis
    "networkx>=3.0",
    # Profiling
    "memory-profiler",
    "line-profiler",
]

# Development tools (not user-facing)
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "pytest-benchmark",
    "ruff>=0.6.0",
    "mypy>=1.5",
    "pre-commit>=2.0",
    "types-setuptools",
    "types-psutil",
]

# Documentation (not user-facing)
docs = [
    "sphinx>=7.0",
    "sphinx-rtd-theme",
    "nbsphinx",
]

# Optional: URLs for your project
[project.urls]
Homepage = "https://github.com/derrring/mfgarchon"
Repository = "https://github.com/derrring/mfgarchon"
# Bug-Tracker = "https://github.com/derrring/mfgarchon/issues"

# --- Setuptools specific configuration ---
# This tells setuptools to automatically find packages in the current directory.
# If your package `mfgarchon` is directly in the root of your project (alongside pyproject.toml),
# this is usually sufficient.
# If `mfgarchon` is inside a `src` directory (e.g., `src/mfgarchon`), you would adjust `where`.
[tool.setuptools.packages.find]
where = ["."]  # Look for packages in the current directory.
include = ["mfgarchon*"]  # Include the mfgarchon package and its subpackages
exclude = ["examples*", "tests*", "benchmarks*", "docs*", "archive*"] # Exclude non-package directories from installation

# Optional: If you have data files to include with your package
# [tool.setuptools.package-data]
# "mfgarchon.some_submodule" = ["*.dat"]

# =============================================================================
# Code Quality and Development Tools Configuration
# =============================================================================

[tool.mypy]
python_version = "3.12"
warn_return_any = false  # Relaxed for scientific code with NumPy operations
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
disallow_untyped_defs = false  # Gradually enable during transition
disallow_incomplete_defs = false  # Research code flexibility
disallow_untyped_calls = false  # Scientific libraries often lack complete type stubs
check_untyped_defs = false  # Too strict for research code
no_implicit_optional = false
strict_optional = false  # More lenient for optional types
warn_no_return = false  # Research code may have incomplete returns
warn_unreachable = false  # Allow unreachable code in research context
show_error_codes = true
show_column_numbers = true
pretty = true
color_output = true
namespace_packages = true
explicit_package_bases = true
cache_dir = ".mypy_cache"
sqlite_cache = true
mypy_path = "stubs"
plugins = [
    "pydantic.mypy",
]
exclude = [
    "archive/",
    "build/",
    "dist/",
    ".venv/",
    "examples/experimental/",
    "mfgarchon/utils/",
    "mfgarchon/workflow/",
    "mfgarchon/visualization/",
    "mfgarchon/backends/",
    "scripts/",
    ".github/",
]

# Scientific computing libraries
[[tool.mypy.overrides]]
module = [
    "numpy.*",
    "scipy.*",
    "matplotlib.*",
    "plotly.*",
    "jax.*",
    "jaxlib.*",
    "numba.*",
    "rich.*",            # rich has type hints but allow ignore for flexibility
    "nbformat.*",
    "jupyter.*",
    "pytest.*",
    "hypothesis.*",
    "colorlog.*",
    "dask.*",
    "igraph.*",
    "networkit.*",
    "networkx.*",
    "polars.*",
    "memory_profiler.*",
    "line_profiler.*",
    "h5py.*",
    "psutil.*",
    "texttable.*",
    "cvxpy.*",
    "osqp.*",
]
ignore_missing_imports = true

# Core MFGArchon modules - stricter checking
[[tool.mypy.overrides]]
module = [
    "mfgarchon.factory.*",
    "mfgarchon.config.*",
    "mfgarchon.utils.validation.*",
]
disallow_untyped_defs = true
check_untyped_defs = true
strict_optional = true

# Gradual strictness for other core modules
[[tool.mypy.overrides]]
module = [
    "mfgarchon.core.*",
    "mfgarchon.alg.*",
]
disallow_incomplete_defs = true
check_untyped_defs = true

# Mathematical variables and naming conventions handled by Ruff configuration


[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--verbose",
    "--cov=mfgarchon",
    "--cov-report=term-missing",
    "--cov-report=html",
    "-x",  # Stop on first failure for faster debugging
    "--tb=short",  # Shorter tracebacks
]

[tool.coverage.run]
source = ["mfgarchon"]
omit = [
    "*/tests/*",
    "*/archive/*",
    "*/__pycache__/*",
    "*/build/*",
    "*/dist/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

# =============================================================================
# Ruff Configuration (Unified Linting and Formatting)
# =============================================================================
# Modern unified tooling - 10-100x faster than legacy tools
# Install with: pip install mfgarchon[dev]

[tool.ruff]
line-length = 120
target-version = "py312"
exclude = [
    ".eggs",
    ".git",
    ".mypy_cache",
    ".tox",
    ".venv",
    "_build",
    "buck-out",
    "build",
    "dist",
    "archive",
]

[tool.ruff.lint]
# Enable comprehensive rules matching current Pylint + flake8 configuration
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "A",    # flake8-builtins
    "C4",   # flake8-comprehensions
    "PT",   # flake8-pytest-style
    "SIM",  # flake8-simplify
    "RUF",  # Ruff-specific rules
    "TCH",  # flake8-type-checking
    "TID",  # flake8-tidy-imports
    "PIE",  # flake8-pie
]
ignore = [
    "E501",   # Line too long (handled by formatter)
    "E722",   # Do not use bare `except` (allow in research code for robustness)
    "N802",   # Function name should be lowercase (mathematical notation: final_error_U, etc.)
    "N803",   # Argument should be lowercase (mathematical notation: allow u, m, U, M, etc.)
    "N806",   # Variable should be lowercase (mathematical notation: allow U, M, etc.)
    "N815",   # Variable in class scope should not be mixedCase (mathematical notation: error_history_U)
    "N816",   # Mixed case variable in global scope (mathematical notation)
    "A003",   # Builtin shadowing (common in scientific code for 'id', 'type', etc.)
    "B008",   # Do not perform function calls in argument defaults (common pattern in factories)
    "B028",   # No explicit stacklevel in warnings (optional in research code)
    "RUF001", # String contains ambiguous Unicode character (allow mathematical symbols)
    "RUF002", # Docstring contains ambiguous Unicode character (allow mathematical symbols)
    "RUF003", # Comment contains ambiguous Unicode character (allow mathematical symbols)
    "RUF022", # `__all__` is not sorted (allow logical grouping)
    "SIM108", # Ternary operator suggestion (allow both styles)
    "SIM102", # Nested if statements (allow for clarity in mathematical conditions)
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
    "N802", "N806", "A003",  # Allow uppercase and shadowing in tests
    "B011",                  # Allow assert False in tests
    "PT011",                 # pytest.raises too broad
    "TID251",                # Tests may use logging.getLogger for edge case testing
]
"examples/**/*.py" = [
    "N803", "N806", "N816",  # Allow mathematical notation in examples
    "T20",                   # Allow print statements in examples
    "B007",                  # Allow unused loop variables in examples
]
"examples/advanced/advanced_visualization_example.py" = [
    "F821",                  # Incomplete example with planned API not yet implemented
]
"examples/advanced/pinn_bayesian_mfg_demo.py" = [
    "E402",                  # Module imports after sys.path manipulation
]
"examples/basic/dgm_simple_validation.py" = [
    "E402",                  # Module imports after sys.path manipulation
]
"scripts/experimental/**/*.py" = [
    "F821",                  # Experimental scripts with placeholder/planned API
]
"benchmarks/**/*.py" = [
    "N803", "N806", "N816",  # Allow mathematical notation in benchmarks
    "T20",                   # Allow print statements in benchmarks
    "E402",                  # Module imports after warnings.filterwarnings (intentional)
]
"mfgarchon/alg/**/*.py" = [
    "N803", "N806", "N816",  # Mathematical notation in algorithms
    "C901",                  # Complex functions allowed in algorithms
]
"mfgarchon/utils/mfg_logging/logger.py" = [
    "TID251",                # Logging infrastructure uses logging.getLogger directly
]
"mfgarchon/core/**/*.py" = [
    "N803", "N806", "N816",  # Mathematical notation in core modules
]

# Ban direct logging.getLogger - use mfg_logging.get_logger instead (Issue #620)
[tool.ruff.lint.flake8-tidy-imports.banned-api]
"logging.getLogger".msg = "Use `from mfgarchon.utils.mfg_logging import get_logger` instead"

[tool.ruff.lint.isort]
known-first-party = ["mfgarchon"]
section-order = ["future", "standard-library", "third-party", "scientific", "first-party", "local-folder"]

[tool.ruff.lint.isort.sections]
scientific = ["numpy", "scipy", "matplotlib", "plotly", "jax", "jaxlib"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

# Pydantic plugin configuration
[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
